name: cshack
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8
  - numpy>=1.21.0,<2.0
  - pip
  - setuptools<70
  - wheel
  - scipy
  - pandas
  - ffmpeg
  - pip:
      - "numpy<2"           # pin again here so pip honors it (else ultralytics deps pull numpy 2.x and break torch ABI)
      - openmim
      - matplotlib
      - opencv-contrib-python<=4.10.0.84
      - pycocotools
      - tqdm
      - onnx
      - onnxruntime-gpu
      - ultralytics
      - gitpython
